#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - ffmpeg
  - python3
  - python3-full
  - python3-pip
  - python3-venv
  - unzip

users:
  - default
  - name: discobot
    gecos: Discord music bot
    groups: users
    shell: /bin/bash
    lock_passwd: true

write_files:
  - path: /etc/systemd/system/disco-at-discord.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Disco at Discord music bot
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=discobot
      Group=discobot
      WorkingDirectory=/opt/disco-at-discord
      EnvironmentFile=/opt/disco-at-discord/.env
      ExecStart=/opt/disco-at-discord/.venv/bin/python /opt/disco-at-discord/bot.py
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /opt/disco-at-discord
  - chown -R discobot:discobot /opt/disco-at-discord
  - sudo -u discobot git clone https://github.com/EchsDee/Disco_at_discord_bot.git /opt/disco-at-discord
  - sudo -u discobot python3 -m venv /opt/disco-at-discord/.venv
  - sudo -u discobot /opt/disco-at-discord/.venv/bin/python -m pip install --upgrade pip
  - sudo -u discobot /opt/disco-at-discord/.venv/bin/python -m pip install -r /opt/disco-at-discord/requirements.txt
  - |
    cat >/opt/disco-at-discord/.env <<'EOF'
    DISCORD_TOKEN=PASTE_YOUR_DISCORD_BOT_TOKEN_HERE
    COMMAND_PREFIX=!
    FFMPEG_EXECUTABLE=ffmpeg
    MUSIC_IDLE_TIMEOUT_SECONDS=60
    DASHBOARD_HOST=127.0.0.1
    DASHBOARD_PORT=8765
    ENABLE_TRAY_ICON=0
    MAX_PLAYLIST_TRACKS=50
    YTDL_EXTRACT_TIMEOUT_SECONDS=90
    YTDL_COOKIE_FILE=
    YTDL_FORMAT=bestaudio/best
    YTDL_JS_RUNTIME=
    EOF
  - chown discobot:discobot /opt/disco-at-discord/.env
  - chmod 600 /opt/disco-at-discord/.env
  - systemctl daemon-reload
  - systemctl enable disco-at-discord.service
  - systemctl start disco-at-discord.service
